# Prefix
unbind C-a
set -g prefix C-g
bind C-g send-prefix

# Widnow Size Adjustment
bind-key -n M-Up resize-pane -U 3
bind-key -n M-Down resize-pane -D 3
bind-key -n M-Left resize-pane -L 3
bind-key -n M-Right resize-pane -R 3

set-option -g mouse on
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Prefix + t で、現在のディレクトリでフローティング端末を開く（トグル）
bind t display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# Move Pane by vim command (Neovim aware, F1-F4 are internal signals)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -r h if-shell "$is_vim" "send-keys F1" "select-pane -L"
bind -r j if-shell "$is_vim" "send-keys F2" "select-pane -D"
bind -r k if-shell "$is_vim" "send-keys F3" "select-pane -U"
bind -r l if-shell "$is_vim" "send-keys F4" "select-pane -R"

# Turn Off Visual Notifications
setw -g monitor-activity off
set -g visual-activity on

# Reload Config
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Neovimへの反映サポート
set-option -g focus-events on

# Status bar
set -g status-interval 5
set -g status-right-length 80
set -g status-right "🐾 %Y/%m/%d %H:%M"
set -g status-fg "colour60"
set -g status-bg "#f2f2f2"

set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm'