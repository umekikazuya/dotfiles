[general]
# import = [
#     "~/.config/alacritty/themes/themes/ayu_mirage.toml"
# ]

[window]
padding = { x = 0, y = 0 }
dynamic_padding = true
opacity = 1.0
blur = true
decorations = "Full"

[scrolling]
multiplier = 5

[font]
normal = { family = "MintMono Nerd Font Mono", style = "Regular" }
bold = { family = "MintMono Nerd Font Mono", style = "Bold" }
italic = { family = "MintMono Nerd Font Mono", style = "Italic" }
bold_italic = { family = "MintMono Nerd Font Mono", style = "Bold Italic" }
size = 12.0
offset = { x = -8, y = 8 }

[terminal]
shell = { program = "/bin/zsh", args = ["-l", "-c", "tmux a -t 0 || tmux"] }

# Kanso Pearl Alacritty Colors

[colors.primary]
background = '#f2f1ef'
foreground = '#545464'

[colors.normal]
black = "#14171d"
red = "#c84053"
green = "#6f894e"
yellow = "#77713f"
blue = "#4d699b"
magenta = "#b35b79"
cyan = "#597b75"
white = "#545464"

[colors.bright]
black = "#8a8980"
red = "#d7474b"
green = "#6e915f"
yellow = "#836f4a"
blue = "#6693bf"
magenta = "#624c83"
cyan = "#5e857a"
white = "#43436c"

[colors.selection]
background = '#c9cbd1'
foreground = '#14171d'

[[colors.indexed_colors]]
index = 16
color = '#e98a00'

[[colors.indexed_colors]]
index = 17
color = '#e82424'